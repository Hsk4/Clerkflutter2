name: Flutter APK Cloud Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: # Allows you to manually click a button to run the build
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Clerk components run optimally on modern target dependencies
      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0' # Matches the Flutter SDK version that resolves the Gradle toolchain failure
          channel: 'stable'
          cache: true

      # Resolves clerk_flutter and structural components automatically
      - name: Fetch Dependencies
        run: flutter pub get

      - name: Compile Release APK
        run: flutter build apk --release

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-apk
          path: build/app/outputs/flutter-apk/app-release.apk